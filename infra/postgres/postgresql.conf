# WrongAnswerBank — PostgreSQL 调优配置（2GB 服务器）
listen_addresses = '*'
max_connections = 20

# 内存（2GB 服务器，PG 控制在 ~250MB）
shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 32MB
effective_cache_size = 512MB

# WAL
wal_compression = on
wal_buffers = 4MB

# 日志（仅记慢查询，避免日志膨胀）
log_min_duration_statement = 500
log_timezone = 'Asia/Shanghai'
log_line_prefix = '%t [%p]: [%l-1] '

# 时区
timezone = 'Asia/Shanghai'
datestyle = 'iso, ymd'
