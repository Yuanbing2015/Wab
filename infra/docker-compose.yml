name: wab

services:
  postgres:
    image: postgres:16-alpine
    container_name: wab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Shanghai
    volumes:
      - ../data/pg_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wab-net

  minio:
    image: minio/minio:latest
    container_name: wab-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: https://wab.ybgames.cn/minio-console
    volumes:
      - ../data/minio_data:/data
    command: server /data --console-address ":9090"
    ports:
      - "127.0.0.1:9000:9000"   # 仅本机暴露，由 nginx 反代到 /files/
      - "127.0.0.1:9090:9090"   # 控制台
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - wab-net

  minio-init:
    image: minio/mc:latest
    container_name: wab-minio-init
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./minio/init-buckets.sh:/init-buckets.sh:ro
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_UPLOADS: ${MINIO_BUCKET_UPLOADS}
      MINIO_BUCKET_TTS: ${MINIO_BUCKET_TTS}
      MINIO_BUCKET_PDFS: ${MINIO_BUCKET_PDFS}
    entrypoint: ["/bin/sh", "/init-buckets.sh"]
    networks:
      - wab-net
    restart: "no"

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: wab-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      MINIO_ENDPOINT: minio:9000
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:8000:8000"   # 由 nginx 反代到 /api/
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - wab-net

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: wab-web
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - ../.env
    environment:
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - wab-net

networks:
  wab-net:
    name: wab-net
    driver: bridge
