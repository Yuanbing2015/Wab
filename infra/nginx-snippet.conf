# =============================================================
#  WrongAnswerBank — Nginx 反代配置片段
#  放置：/etc/nginx/conf.d/wab.conf
#  并在主 nginx.conf 的 http 块末确保 include /etc/nginx/conf.d/*.conf
#
#  前置条件：
#  1. 已申请 wab.ybgames.cn 的 SSL 证书（推荐 Certbot）
#  2. docker-compose 已起，端口 3000/8000/9000 仅监听 127.0.0.1
# =============================================================

# 限速：避免恶意请求打爆后端
limit_req_zone $binary_remote_addr zone=wab_api:10m rate=20r/s;

server {
    listen 443 ssl http2;
    server_name wab.ybgames.cn;

    # SSL 证书（Certbot 默认路径，按你的实际位置修改）
    ssl_certificate     /etc/letsencrypt/live/wab.ybgames.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wab.ybgames.cn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # 大图上传（整张试卷扫描）
    client_max_body_size 30M;
    client_body_timeout 60s;

    # 通用安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------- 前端 Next.js SSR ----------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # ---------- 后端 FastAPI ----------
    location /api/ {
        limit_req zone=wab_api burst=40 nodelay;
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # AI 调用可能慢
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # ---------- MinIO 对象（presigned URL 访问） ----------
    location /files/ {
        rewrite ^/files/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        # 缓存静态资源（题图、MP3）
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ---------- MinIO 控制台（仅供你调试） ----------
    location /minio-console/ {
        proxy_pass http://127.0.0.1:9090/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# HTTP → HTTPS
server {
    listen 80;
    server_name wab.ybgames.cn;
    return 301 https://$server_name$request_uri;
}
